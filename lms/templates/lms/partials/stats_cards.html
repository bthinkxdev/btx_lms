<section class="sp-stats" aria-label="Quick stats">
  <div class="sp-stats-grid">
    <article class="sp-stat-card dashboard-card sp-card-elevated">
      <span class="sp-stat-icon" aria-hidden="true"><i class="fa-solid fa-book-open"></i></span>
      <span class="sp-stat-value">{{ enrollment_total_count }}</span>
      <span class="sp-stat-label">Courses enrolled</span>
    </article>
    <article class="sp-stat-card dashboard-card sp-card-elevated">
      <span class="sp-stat-icon" aria-hidden="true"><i class="fa-solid fa-circle-check"></i></span>
      <span class="sp-stat-value">{{ courses_completed_count }}</span>
      <span class="sp-stat-label">Courses completed</span>
    </article>
    <article class="sp-stat-card dashboard-card sp-card-elevated">
      <span class="sp-stat-icon" aria-hidden="true"><i class="fa-solid fa-award"></i></span>
      <span class="sp-stat-value">{{ certificate_count }}</span>
      <span class="sp-stat-label">Certificates</span>
    </article>
    <article class="sp-stat-card dashboard-card sp-card-elevated">
      <span class="sp-stat-icon" aria-hidden="true"><i class="fa-solid fa-fire"></i></span>
      <span class="sp-stat-value">{{ learning_streak_days }}</span>
      <span class="sp-stat-label">Day streak</span>
    </article>
  </div>
</section>
